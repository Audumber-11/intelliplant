services:
  - type: web
    name: intelliplant-api
    env: python
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./intelliplant.db
      - key: HOST
        value: 0.0.0.0
    healthCheckPath: /health
    autoDeploy: true
    plan: free
