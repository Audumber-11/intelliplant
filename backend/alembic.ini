[alembic]
# Template used for migration files
# Put your template files in ./alembic/templates
# file_template = %%(rev)s_%%(slug)s

# Set to 'true' to run the environment during the 'autogenerate' process
# This is needed if you're using SQLAlchemy 1.4+ with async
prepend_sys_path = .

# Version path
version_locations = %(here)s/versions

# SQLAlchemy URL (will be overridden by env.py)
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/intelliplant

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S